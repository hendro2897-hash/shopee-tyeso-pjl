<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Penjualan Shopee Tyeso Medan</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 6px; }
    .estimated { background-color: #fff3cd; }
    .completed { background-color: #d4edda; }

    button.icon {
      font-size: 18px;
      padding: 6px 10px;
      margin-left: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Dashboard Penjualan Shopee Tyeso Medan</h2>

<h3>Upload File</h3>

<input type="file" id="fileInput">
<br><br>

<button onclick="uploadOrder()">Upload Order</button>
<button onclick="uploadIncome()">Upload Income</button>

<p id="message" style="color:red;"></p>

<br><br>

<select id="statusFilter">
  <option value="all">All</option>
  <option value="Selesai">Completed</option>
  <option value="pending">Pending</option>
  <option value="Cancel">Cancel</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="loadData()">View Report</button>

<!-- ICON BUTTONS -->
<button class="icon" onclick="exportToExcel()">📊</button>
<button class="icon" onclick="exportToPDF()">📄</button>

<hr>

<table id="table">
  <thead>
    <tr>
      <th>Order Date</th>
      <th>Order No</th>
      <th>Status</th>
      <th>Product</th>
      <th>Variant</th>
      <th>SKU</th>
      <th>Initial Price (Rp)</th>
      <th>Deducted (Rp)</th>
      <th>Shopee Fee (Rp)</th>
      <th>Net Income (Rp)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://tndkvtyvfppowqxphnxv.supabase.co",
  "YOUR_ANON_KEY_HERE"
);

// ===== PARSE NUMBER =====
function parseNumber(val) {
  if (!val) return 0;
  if (typeof val === "number") return val;
  val = val.toString().replace(/\./g, "").replace(",", ".");
  return parseFloat(val) || 0;
}

// ===== FORMAT =====
function formatNumber(num) {
  return (num || 0).toLocaleString("id-ID");
}

// ===== FEE =====
function calculateFee(base) {
  return base * 0.117 +
         Math.min(base * 0.018, 50000) +
         Math.min(base * 0.045, 60000) +
         1250;
}

// ===== UPLOAD ORDER =====
async function uploadOrder() {
  try {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file first");

    const wb = XLSX.read(await file.arrayBuffer());
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    for (let r of rows) {

      let status = r["Status Pesanan"];
      let cancelStatus = r["Status Pembatalan/ Pengembalian"];
      if (status === "Selesai" && cancelStatus) status = "Cancel";

      let initial = parseNumber(r["Harga Awal"]) * parseNumber(r["Jumlah"]);

      let deducted =
        parseNumber(r["Voucher disponsor oleh Penjual"]) +
        parseNumber(r["Voucher co-fund disponsor oleh Penjual"]) +
        parseNumber(r["Cashback Koin disponsori Penjual"]) +
        parseNumber(r["Cashback Koin Co-fund disponsori Penjual"]) +
        parseNumber(r["Promo Gratis Ongkir dari Penjual"]);

      let base = initial - deducted;
      let fee = calculateFee(base);

      await supabaseClient.from("orders").upsert({
        order_id: r["No. Pesanan"],
        order_date: r["Waktu Pesanan Dibuat"],
        status,
        product_name: r["Nama Produk"],
        variant: r["Nama Variasi"],
        sku: r["Nomor Referensi SKU"],
        initial_price: initial,
        deducted,
        shopee_fee: fee,
        net_income: base - fee,
        is_estimated: true
      }, {
        onConflict: ["order_id", "product_name", "variant", "sku"]
      });
    }

    alert("✅ Order uploaded");
    loadData();

  } catch (err) {
    alert(err.message);
  }
}

// ===== UPLOAD INCOME (FIXED) =====
async function uploadIncome() {
  try {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file first");

    const wb = XLSX.read(await file.arrayBuffer());
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    for (let r of rows) {
      await supabaseClient
        .from("orders")
        .update({
          shopee_fee: parseNumber(r["Biaya Administrasi (termasuk PPN 11%)"]),
          net_income: parseNumber(r["Dana Diterima"]),
          is_estimated: false
        })
        .eq("order_id", r["No. Pesanan"]);
    }

    alert("✅ Income updated");
    loadData();

  } catch (err) {
    alert(err.message);
  }
}

// ===== LOAD DATA =====
async function loadData() {

  let startDate = document.getElementById("startDate").value;
  let endDate = document.getElementById("endDate").value;

  if (!startDate || !endDate) {
    alert("Select date first");
    return;
  }

  let { data } = await supabaseClient.from("orders").select("*");

  let tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(r => {
    let tr = document.createElement("tr");

    if (r.is_estimated) tr.classList.add("estimated");
    else tr.classList.add("completed");

    tr.innerHTML = `
      <td>${r.order_date}</td>
      <td>${r.order_id}</td>
      <td>${r.status}</td>
      <td>${r.product_name}</td>
      <td>${r.variant}</td>
      <td>${r.sku}</td>
      <td>${formatNumber(r.initial_price)}</td>
      <td>${formatNumber(r.deducted)}</td>
      <td>${formatNumber(r.shopee_fee)}</td>
      <td>${formatNumber(r.net_income)}</td>
    `;

    tbody.appendChild(tr);
  });
}

// ===== EXPORT EXCEL =====
function exportToExcel() {
  let wb = XLSX.utils.table_to_book(document.getElementById("table"));
  XLSX.writeFile(wb, "Shopee.xlsx");
}

// ===== EXPORT PDF =====
function exportToPDF() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("Shopee Report", 10, 10);

  let rows = document.querySelectorAll("#table tbody tr");
  let y = 20;

  rows.forEach(r => {
    let text = Array.from(r.children).map(td => td.innerText).join(" | ");
    doc.text(text, 10, y);
    y += 7;
  });

  doc.save("Shopee.pdf");
}
</script>

</body>
</html>
