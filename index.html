<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Penjualan Shopee Tyeso Medan</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 6px; }
    .estimated { background-color: #fff3cd; }
  </style>
</head>

<body>

<h2>Dashboard Penjualan Shopee Tyeso Medan</h2>

<h3>Upload File</h3>

<input type="file" id="fileInput">
<br><br>

<button onclick="uploadOrder()">Upload as Order Data</button>
<button onclick="uploadIncome()">Upload as Income Data</button>

<p id="message" style="color:red;"></p>

<br><br>

<select id="statusFilter">
  <option value="all">All</option>
  <option value="Selesai">Completed</option>
  <option value="pending">Pending</option>
  <option value="Cancel">Cancel</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="loadData()">View Report</button>

<hr>

<table id="table">
  <thead>
    <tr>
      <th>Order Date</th>
      <th>Order No</th>
      <th>Status</th>
      <th>Product</th>
      <th>Variant</th>
      <th>SKU</th>
      <th>Initial Price (Rp)</th>
      <th>Deducted (Rp)</th>
      <th>Shopee Fee (Rp)</th>
      <th>Net Income (Rp)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://tndkvtyvfppowqxphnxv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZGt2dHl2ZnBwb3dxeHBobnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDE3MTMsImV4cCI6MjA5MTI3NzcxM30.wy8qeC3iQHSMmD7Au7IKmqhO3Mv7iZmX6IOpPE7JpBc"
);

// ===== PARSE NUMBER =====
function parseNumber(val) {
  if (val === null || val === undefined || val === "") return 0;
  if (typeof val === "number") return val;

  val = val.toString().trim();
  val = val.replace(/\./g, "");
  val = val.replace(",", ".");

  return parseFloat(val) || 0;
}

// ===== FORMAT NUMBER =====
function formatNumber(num) {
  return (num || 0).toLocaleString("id-ID");
}

// ===== FEE =====
function calculateFee(base) {
  let admin = base * 0.117;
  let payment = Math.min(base * 0.018, 50000);
  let promo = Math.min(base * 0.045, 60000);
  let processing = 1250;
  return admin + payment + promo + processing;
}

// ===== UPLOAD ORDER =====
async function uploadOrder() {
  try {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file first");

    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    if (!rows[0]["Nama Produk"]) {
      alert("❌ Not a valid Order file!");
      return;
    }

    for (let r of rows) {
      let order_id = r["No. Pesanan"];

      // ===== STATUS LOGIC (IMPORTANT) =====
      let status = r["Status Pesanan"];
      let cancelStatus = r["Status Pembatalan/ Pengembalian"];

      if (status === "Selesai" && cancelStatus) {
        status = "Cancel";
      }

      let price = parseNumber(r["Harga Awal"]);
      let qty = parseNumber(r["Jumlah"]);
      let initial = price * qty;

      let deducted =
        parseNumber(r["Voucher disponsor oleh Penjual"]) +
        parseNumber(r["Voucher co-fund disponsor oleh Penjual"]) +
        parseNumber(r["Cashback Koin disponsori Penjual"]) +
        parseNumber(r["Cashback Koin Co-fund disponsori Penjual"]) +
        parseNumber(r["Promo Gratis Ongkir dari Penjual"]);

      let base = initial - deducted;
      let fee = calculateFee(base);
      let net = base - fee;

      await supabaseClient.from("orders").upsert({
        order_id,
        order_date: r["Waktu Pesanan Dibuat"],
        status,
        product_name: r["Nama Produk"],
        variant: r["Nama Variasi"],
        sku: r["Nomor Referensi SKU"],
        qty,
        initial_price: initial,
        deducted,
        shopee_fee: fee,
        net_income: net,
        is_estimated: true
      });
    }

    alert("✅ Order upload success!");
    loadData();

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// ===== UPLOAD INCOME =====
async function uploadIncome() {
  try {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file first");

    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    if (!rows[0]["Dana Diterima"]) {
      alert("❌ Not a valid Income file!");
      return;
    }

    for (let r of rows) {
      await supabaseClient
        .from("orders")
        .update({
          shopee_fee: parseNumber(r["Biaya Administrasi (termasuk PPN 11%)"]),
          net_income: parseNumber(r["Dana Diterima"]),
          is_estimated: false
        })
        .eq("order_id", r["No. Pesanan"]);
    }

    alert("✅ Income updated!");
    loadData();

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// ===== LOAD DATA WITH FILTER =====
async function loadData() {

  let statusFilter = document.getElementById("statusFilter").value;
  let startDate = document.getElementById("startDate").value;
  let endDate = document.getElementById("endDate").value;

  let query = supabaseClient.from("orders").select("*");

  // ===== STATUS FILTER =====
  if (statusFilter === "Selesai") {
    query = query.eq("status", "Selesai");
  }

  if (statusFilter === "pending") {
    query = query.not("status", "in", "(Selesai,Cancel)");
  }

  if (statusFilter === "Cancel") {
    query = query.eq("status", "Cancel");
  }

  // ===== DATE FILTER =====
  if (startDate) {
    query = query.gte("order_date", startDate);
  }

  if (endDate) {
    query = query.lte("order_date", endDate);
  }

  let { data } = await query;

  let tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  let grouped = {};
  let counted = new Set();

  let totalInitial = 0;
  let totalDeducted = 0;
  let totalFee = 0;
  let totalNet = 0;

  data.forEach(row => {
    if (!grouped[row.order_id]) grouped[row.order_id] = [];
    grouped[row.order_id].push(row);
  });

  for (let order_id in grouped) {
    let rows = grouped[order_id];

    rows.forEach((r, i) => {
      let tr = document.createElement("tr");

      if (r.is_estimated) tr.classList.add("estimated");

      totalInitial += r.initial_price;

      if (!counted.has(order_id)) {
        totalDeducted += r.deducted || 0;
        totalFee += r.shopee_fee || 0;
        totalNet += r.net_income || 0;
        counted.add(order_id);
      }

      tr.innerHTML = `
        <td>${i==0 ? r.order_date : ""}</td>
        <td>${i==0 ? r.order_id : ""}</td>
        <td>${i==0 ? r.status : ""}</td>
        <td>${r.product_name}</td>
        <td>${r.variant}</td>
        <td>${r.sku}</td>
        <td>${formatNumber(r.initial_price)}</td>
        <td>${i==0 && r.status !== "Cancel" ? formatNumber(r.deducted) : ""}</td>
        <td>${i==0 && r.status !== "Cancel" ? formatNumber(r.shopee_fee) : ""}</td>
        <td>${i==0 && r.status !== "Cancel" ? formatNumber(r.net_income) : ""}</td>
      `;

      tbody.appendChild(tr);
    });
  }

  let totalRow = document.createElement("tr");
  totalRow.style.fontWeight = "bold";
  totalRow.style.background = "#e9ecef";

  totalRow.innerHTML = `
    <td colspan="6">TOTAL</td>
    <td>${formatNumber(totalInitial)}</td>
    <td>${formatNumber(totalDeducted)}</td>
    <td>${formatNumber(totalFee)}</td>
    <td>${formatNumber(totalNet)}</td>
  `;

  tbody.appendChild(totalRow);
}
</script>

</body>
</html>
